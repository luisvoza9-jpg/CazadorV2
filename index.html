<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DefensaDigital Pro | Auditoría de Seguridad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #3b82f6; 
            --primary-glow: rgba(59, 130, 246, 0.4);
            --bg-overlay: rgba(15, 23, 42, 0.75); 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.6); 
            --border: rgba(255, 255, 255, 0.1); 
            --danger: #ef4444; 
            --warning: #f59e0b; 
            --success: #10b981; 
            --console-bg: #020617;
        }

        body { 
            background-color: #0f172a;
            background-image: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.8)), url('fondo.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
            padding: 20px; 
        }

        .header, .container { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 650px; }
        .header { text-align: center; margin-bottom: 1.5rem; background: var(--bg-overlay); padding: 15px; }
        .header h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .container { background: var(--card-bg); padding: 2rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        input { flex-grow: 1; padding: 14px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); color: white; border-radius: 8px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 14px 25px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }

        #console { background: var(--console-bg); color: var(--success); padding: 15px; border-radius: 8px; font-family: 'Fira Code', monospace; font-size: 0.8rem; height: 150px; overflow-y: auto; margin-bottom: 1.5rem; display: none; border: 1px solid #1e293b; }

        .result-box { display: none; border-top: 1px solid var(--border); padding-top: 1.5rem; }
        .vulnerability-card { border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 1rem; background: rgba(15, 23, 42, 0.4); border-left: 4px solid var(--danger); }
        
        .action-zone { text-align: center; margin-top: 1.5rem; padding: 1.5rem; background: rgba(59, 130, 246, 0.1); border-radius: 10px; }
        .btn-container { display: flex; flex-direction: column; gap: 10px; }
        
        /* BOTÓN CPAGRIP */
        .lock-btn { background: var(--text-main); color: #0f172a; padding: 14px; text-decoration: none; border-radius: 8px; font-weight: 800; transition: 0.3s; display: block; }
        .lock-btn:hover { background: #e2e8f0; transform: scale(1.02); }
        
        /* BOTÓN EMAIL */
        .email-btn { background: transparent; color: var(--text-main); border: 1px solid var(--border); padding: 10px; text-decoration: none; border-radius: 8px; font-size: 0.9rem; display: block; }

        /* BANNER COOKIES */
        #cookie-banner { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid var(--border); padding: 15px 25px; border-radius: 12px; display: flex; align-items: center; gap: 15px; z-index: 9999; width: 90%; max-width: 500px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>DefensaDigital Pro</h1>
        <p>Auditoría de Seguridad e Integridad Web</p>
    </div>

    <div class="container">
        <div class="input-group">
            <input type="text" id="targetUrl" placeholder="https://www.ejemplo.com">
            <button id="scanBtn" onclick="startScan()">Analizar Sitio</button>
        </div>

        <div id="console"></div>

        <div id="resultBox" class="result-box">
            <div id="finalStatus" style="text-align:center; margin-bottom:15px;"></div>
            <div id="details"></div>
            
            <div class="action-zone">
                <p style="margin-bottom:15px;"><b>⚠️ Acción requerida para ver el reporte:</b></p>
                <div class="btn-container">
                    <a href="https://trianglerockers.com/1888166" class="lock-btn">🔓 DESBLOQUEAR INFORME TÉCNICO</a>
                    <a href="mailto:luisvoza9@gmail.com?subject=Consulta%20Seguridad" class="email-btn">📧 Contactar Soporte (luisvoza9@gmail.com)</a>
                </div>
            </div>
        </div>
    </div>

    <div id="cookie-banner">
        <p style="margin: 0; font-size: 0.8rem; color: #cbd5e1;">Utilizamos cookies de seguridad para validar la auditoría. <a href="#" style="color:white">Leer más</a></p>
        <button onclick="document.getElementById('cookie-banner').style.display='none'" style="padding: 6px 12px; font-size: 0.7rem;">Aceptar</button>
    </div>

    <script>
        function startScan() {
            const url = document.getElementById('targetUrl').value;
            if(!url) return;
            const scanBtn = document.getElementById('scanBtn');
            const consoleDiv = document.getElementById('console');
            const resultBox = document.getElementById('resultBox');
            
            scanBtn.disabled = true;
            consoleDiv.style.display = 'block';
            consoleDiv.innerHTML = "";
            resultBox.style.display = 'none';

            const logs = ["> Iniciando handshake...", "> Analizando cabeceras HTTP...", "> Verificando certificados SSL...", "> Buscando fugas de información...", "> Generando reporte forense..."];
            let i = 0;
            const interval = setInterval(() => {
                consoleDiv.innerHTML += `<div style="margin-bottom:5px;">[SEC-SCAN] ${logs[i]}</div>`;
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
                i++;
                if (i >= logs.length) {
                    clearInterval(interval);
                    document.getElementById('finalStatus').innerHTML = "<h2 style='color:var(--danger); margin:0;'>⚠️ NIVEL DE RIESGO: CRÍTICO</h2>";
                    document.getElementById('details').innerHTML = `
                        <div class='vulnerability-card'><b>Cabeceras Expuestas:</b><p>Se detectó la versión del servidor. Vulnerable a exploits dirigidos.</p></div>
                        <div class='vulnerability-card'><b>Falta de HSTS:</b><p>La conexión puede ser interceptada por terceros.</p></div>`;
                    
                    setTimeout(() => {
                        consoleDiv.style.display = 'none';
                        resultBox.style.display = 'block';
                        scanBtn.disabled = false;
                    }, 1000);
                }
            }, 800);
        }
    </script>
</body>
</html>
