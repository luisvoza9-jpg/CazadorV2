    <style>
        :root { 
            --primary: #3b82f6; --primary-glow: rgba(59, 130, 246, 0.4);
            --bg-overlay: rgba(15, 23, 42, 0.75); --text-main: #f8fafc; 
            --text-muted: #94a3b8; --card-bg: rgba(30, 41, 59, 0.6); 
            --border: rgba(255, 255, 255, 0.1); --danger: #ef4444; 
            --warning: #f59e0b; --success: #10b981; --console-bg: #020617;

        * { box-sizing: border-box; }
        
        body { 
            background-color: #0f172a;
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=1920'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-main); font-family: 'Inter', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 40px 20px;
            overflow-y: auto;

        .credits-badge {
            position: fixed; top: 20px; right: 20px; background: rgba(15, 23, 42, 0.9);
            padding: 10px 20px; border-radius: 30px; border: 1px solid var(--primary);
            font-family: 'Fira Code', monospace; font-size: 0.9rem; z-index: 100;
            box-shadow: 0 0 15px var(--primary-glow); backdrop-filter: blur(5px);
        }

        /* Splash Screen y Efecto Escudos */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease, visibility 0.8s; }
        #splashCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .splash-logo { width: 80px; height: 80px; margin-bottom: 20px; opacity: 0; transition: opacity 0.3s ease; filter: drop-shadow(0 0 5px var(--primary)); }
        .splash-static-show { opacity: 1 !important; animation: pulseGlow 2s infinite; }
        .splash-bar-container { width: 250px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; opacity: 0; transition: opacity 0.3s ease;}
        .splash-bar-fill { height: 100%; width: 0%; background: var(--primary); }
        .show-bar { opacity: 1 !important; }
        .fill-bar { animation: loadSystem 1s ease-out forwards; }
        .splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        @keyframes loadSystem { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes pulseGlow { 0%, 100% { filter: drop-shadow(0 0 5px var(--primary)); transform: scale(1); } 50% { filter: drop-shadow(0 0 15px var(--primary)); transform: scale(1.05); } }

        #cyberCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.3; }

        /* Contenedores */
        .header { position: relative; z-index: 10; text-align: center; margin-bottom: 2rem; background: var(--bg-overlay); padding: 20px 40px; border-radius: 16px; border: 1px solid var(--border); backdrop-filter: blur(10px); width: 100%; max-width: 650px;}
        .header h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* ESCUDO DEL HEADER */
        .header-shield { width: 32px; height: 32px; filter: drop-shadow(0 0 8px var(--primary)); }

        .container { position: relative; z-index: 10; background: var(--card-bg); padding: 2.5rem; width: 100%; max-width: 650px; border-radius: 16px; border: 1px solid var(--border); backdrop-filter: blur(16px); transform-style: preserve-3d; transition: transform 0.1s ease-out; margin-bottom: 50px; }
        
        .input-group { display: flex; gap: 12px; transform: translateZ(20px); }
        input { flex-grow: 1; padding: 14px; background: rgba(15, 23, 42, 0.8); border: 1px solid var(--border); color: white; border-radius: 10px; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--primary); }
        
        button { background: linear-gradient(135deg, var(--primary), #2563eb); color: white; border: none; padding: 14px 28px; font-weight: 600; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #334155; opacity: 0.6; cursor: not-allowed; }

        .divider { height: 1px; background: var(--border); margin: 25px 0; width: 100%; }
        .secondary-btn { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid #3b82f6; width: 100%; padding: 12px; font-size: 0.9rem; margin-bottom: 1.5rem; display: flex; justify-content: center; align-items: center; gap: 8px; border-radius: 10px; cursor: pointer; transition: 0.3s;}
        .secondary-btn:hover { background: rgba(59, 130, 246, 0.2); }

        #reloadBtn { background: linear-gradient(135deg, #10b981, #059669); margin-top: 10px; display: none; width: 100%; font-weight: 800; font-size: 1rem;}

        /* Terminal Hacker */
        #console { background: var(--console-bg); color: var(--success); padding: 20px; border-radius: 10px; font-family: 'Fira Code', monospace; font-size: 0.85rem; line-height: 1.6; height: 180px; overflow-y: auto; margin-bottom: 1.5rem; display: none; border: 1px solid #1e293b; position: relative; }
        .blinking-cursor { display: inline-block; width: 8px; height: 15px; background-color: var(--success); vertical-align: middle; animation: blink 1s step-end infinite; margin-left: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .log-prefix { color: #38bdf8; font-weight: bold; } .log-warn { color: var(--warning); } .log-hex { color: #64748b; font-size: 0.75rem; margin-right: 8px; }

        /* Resultados */
        .result-box { display: none; padding-top: 1.5rem; transform: translateZ(30px); }
        .vulnerability-card { border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 1rem; background: rgba(15, 23, 42, 0.4); border-left: 4px solid var(--warning); }
        .lock-btn { background: linear-gradient(135deg, #ffffff, #f1f5f9); color: #0f172a; padding: 16px; border-radius: 10px; font-weight: 900; display: block; text-align: center; text-decoration: none; margin-top: 25px; box-shadow: 0 4px 15px rgba(255,255,255,0.1); transition: transform 0.2s; cursor: pointer; }
        .lock-btn:hover { transform: translateY(-2px); }

        /* ESTILOS PROFESIONALES PARA IMPRIMIR/PDF */
        @media print {
            body { background: white !important; color: black !important; padding: 0; margin: 0; }
            #splash-screen, #cyberCanvas, .input-group, .divider, .secondary-btn, #reloadBtn, .lock-btn, .credits-badge { display: none !important; }
            .container, .header { background: white !important; border: none !important; box-shadow: none !important; color: black !important; filter: none !important; }
            .header h1 { background: none; color: #0f172a !important; -webkit-text-fill-color: #0f172a !important; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; justify-content: flex-start;}
            .header-shield { filter: none !important; stroke: #3b82f6 !important; }
            .vulnerability-card { background: #fff5f5 !important; border: 1px solid #ffcccc !important; border-left: 5px solid #ef4444 !important; color: #000 !important; }
            * { text-shadow: none !important; }
        }
    </style>

    <script>
        // === SEGURIDAD ANTI-TRAMPAS ===
        if(window.location.search.includes('recarga=ok')) {
            localStorage.setItem('user_credits', 3);
            window.history.replaceState({}, document.title, window.location.pathname);
            alert("⚡ ¡Sistema verificado! Energía restaurada al máximo nivel.");
        }

        // === SISTEMA DE MONEDAS ===
        let credits = localStorage.getItem('user_credits') ? parseInt(localStorage.getItem('user_credits')) : 3;
        let is3DActive = false;
        updateUI();

        function updateUI() {
            document.getElementById('creditCount').innerText = credits;
            if (credits <= 0) {
                document.getElementById('scanBtn').style.display = 'none';
                document.getElementById('targetUrl').style.display = 'none';
                document.getElementById('sysScanWrapper').style.display = 'none'; 
                document.getElementById('reloadBtn').style.display = 'block';
                document.getElementById('resultBox').style.display = 'none';
            } else {
                document.getElementById('scanBtn').style.display = 'block';
                document.getElementById('targetUrl').style.display = 'block';
                document.getElementById('sysScanWrapper').style.display = 'block'; 
                document.getElementById('reloadBtn').style.display = 'none';
            }
        }

        // === LLAMADA AL CONTENT LOCKER ===
        function gamifiedRecharge() {
            if (typeof call_locker !== 'undefined') {
                call_locker();
            } else {
                alert("⚠️ Conectando a servidor seguro para verificación...");
                console.error("Aviso: El código <script> de CPAGrip no está en el <head>.");
            }
        }

        // === FÍSICA 3D ===
        document.addEventListener('mousemove', (e) => {
            if(!is3DActive) return;
            let xAxis = (window.innerWidth / 2 - e.pageX) / 50; 
            let yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            document.getElementById('mainContainer').style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        document.addEventListener('mouseleave', () => {
            if(is3DActive) document.getElementById('mainContainer').style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // === INTRO DE ESCUDOS PROFESIONAL ===
        function runSplashIntro() {
            const canvas = document.getElementById('splashCanvas');
            const ctx = canvas.getContext('2d');
            const mainLogo = document.getElementById('splashMainLogo');
            const splashBar = document.getElementById('splashBar');
            const splashFill = document.getElementById('splashFill');
            let mW, mH;
            
            function resize() { mW = canvas.width = window.innerWidth; mH = canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize); resize();

            function drawShieldPath(ctx, x, y, size) {
                ctx.moveTo(x, y - size);
                ctx.quadraticCurveTo(x + size * 0.9, y - size * 0.9, x + size, y + size * 0.2);
                ctx.quadraticCurveTo(x + size * 0.8, y + size * 0.8, x, y + size);
                ctx.quadraticCurveTo(x - size * 0.8, y + size * 0.8, x - size, y + size * 0.2);
                ctx.quadraticCurveTo(x - size * 0.9, y - size * 0.9, x, y - size);
            }

            class CoreParticle {
                constructor() {
                    this.x = Math.random() * mW; this.y = Math.random() * mH;
                    this.targetX = mW / 2; this.targetY = mH / 2;
                    this.size = Math.random() * 6 + 4;
                    this.color = Math.random() > 0.5 ? '#3b82f6' : '#a78bfa';
                    this.opacity = 0; this.converge = false;
                    this.speed = Math.random() * 0.015 + 0.005;
                    this.flickerSpeed = Math.random() * 0.1;
                    this.time = Math.random() * 100;
                }
                update() {
                    this.time += this.flickerSpeed;
                    if(!this.converge) this.opacity = Math.sin(this.time) * 0.5 + 0.5;
                    if(this.converge) {
                        this.x += (this.targetX - this.x) * (this.speed * 2); 
                        this.y += (this.targetY - this.y) * (this.speed * 2);
                        this.opacity = 0.8; this.size *= 0.985;
                    }
                }
                draw() {
                    if(this.size < 0.1 || this.opacity < 0.01) return;
                    ctx.save(); ctx.globalAlpha = this.opacity; ctx.strokeStyle = this.color;
                    ctx.lineWidth = 1; ctx.beginPath(); drawShieldPath(ctx, this.x, this.y, this.size);
                    ctx.stroke(); ctx.globalAlpha = this.opacity * 0.3; ctx.fillStyle = this.color;
                    ctx.fill(); ctx.restore();
                }
            }

            let particles = [];
            for(let i = 0; i < 150; i++) particles.push(new CoreParticle());

            function animateMerge() {
                ctx.clearRect(0,0,mW,mH);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animateMerge);
            }
            animateMerge();

            setTimeout(() => { particles.forEach(p => p.converge = true); }, 1500);
            setTimeout(() => {
                particles = []; ctx.clearRect(0,0,mW,mH);
                mainLogo.classList.add('splash-static-show');
                splashBar.classList.add('show-bar'); splashFill.classList.add('fill-bar');
            }, 2700);

            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('splash-hidden');
                setTimeout(() => { is3DActive = true; document.getElementById('targetUrl').focus(); }, 300); 
            }, 4200);
        }
        document.addEventListener("DOMContentLoaded", runSplashIntro);

        // === UTILIDADES DE TERMINAL ===
        function getHex() { return '[0x' + Math.floor(Math.random()*16777215).toString(16).toUpperCase().padStart(4, '0') + '] '; }
        
        async function typeLog(text, cons, speed = 15) {
            const cursor = cons.querySelector('.blinking-cursor');
            const line = document.createElement('div');
            cons.insertBefore(line, cursor);
            for(let char of text) {
                line.innerHTML += char;
                cons.scrollTo({ top: cons.scrollHeight, behavior: 'smooth' });
                await new Promise(r => setTimeout(r, speed));
            }
            await new Promise(r => setTimeout(r, 300));
        }

        function lockUI(cons, res) {
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('sysScanBtn').disabled = true;
            cons.style.display = 'block';
            cons.innerHTML = "<span class='blinking-cursor'></span>";
            res.style.display = 'none';
        }

        function unlockUI() {
            document.getElementById('scanBtn').disabled = false;
            document.getElementById('sysScanBtn').disabled = false;
        }

        // === 1. AUDITORÍA DE DOMINIO ===
        async function runAudit() {
            const domain = document.getElementById('targetUrl').value.trim();
            if(!domain || !domain.includes('.')) { alert("Introduce un dominio válido"); return; }
            
            credits--; localStorage.setItem('user_credits', credits); updateUI();
            const cons = document.getElementById('console');
            const res = document.getElementById('resultBox');
            lockUI(cons, res);

            await typeLog(`<span class="log-hex">${getHex()}</span><span class="log-prefix">[INIT]</span> Iniciando conexión DNS a ${domain}...`, cons);
            
            try {
                const response = await fetch(`https://dns.google/resolve?name=${domain}`);
                const data = await response.json();
                const ip = data.Answer ? data.Answer[0].data : "IP Enmascarada";
                await typeLog(`<span class="log-hex">${getHex()}</span><span class="log-prefix">[DNS]</span> IPv4 Detectada: <span style="color:#fff">${ip}</span>`, cons);

                let geoData = { city: "Desconocida", country_name: "Protegido" };
                try {
                    const geoRes = await fetch(`https://ipapi.co/${ip.split(',')[0]}/json/`);
                    if(geoRes.ok) geoData = await geoRes.json();
                } catch(e) {}

                await typeLog(`<span class="log-hex">${getHex()}</span><span class="log-prefix">[GEO]</span> Localización: ${geoData.city || 'Cloud'}, ${geoData.country_name || 'Global'}`, cons);
                await typeLog(`<span class="log-hex">${getHex()}</span><span class="log-prefix log-warn">[WARN]</span> Vulnerabilidad en cabeceras detectada.`, cons);

                setTimeout(() => {
                    cons.style.display = 'none'; res.style.display = 'block';
                    let dateStr = new Date().toLocaleString('es-ES');
                    document.getElementById('finalStatus').innerHTML = "<h2 style='color:var(--danger); margin:0;'>⚠️ RIESGO DETECTADO</h2>";
                    document.getElementById('details').innerHTML = `
                        <div class="vulnerability-card" style="border-left-color:var(--danger)">
                            <b>🔍 REPORTE DE AUDITORÍA FORENSE</b><br><br>
                            <b>Objetivo:</b> ${domain}<br>
                            <b>Fecha del escaneo:</b> ${dateStr}<br>
                            <hr style="border-color: rgba(255,255,255,0.1); margin: 10px 0;">
                            <b>Dirección IP:</b> ${ip}<br>
                            <b>Ubicación del Servidor:</b> ${geoData.city || 'Nodo Externo'}, ${geoData.country_name || ''}<br>
                            <b>Nivel de Amenaza:</b> Alto<br>
                            <p style="font-size:0.85rem; opacity:0.8; margin-top:10px;"><b>Detalles:</b> El servidor expone cabeceras sensibles. Riesgo de secuestro de datos medio-alto. Se recomienda parchear la configuración DNS y ocultar la procedencia de la IP mediante un proxy inverso.</p>
                        </div>`;
                    unlockUI();
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 800);
            } catch (e) {
                cons.innerHTML += `<div style='color:var(--danger)'><span class="log-hex">${getHex()}</span> [ERROR CRÍTICO] Conexión rechazada por el host.</div>`;
                unlockUI();
            }
        }

        // === 2. ANÁLISIS DE SISTEMA LOCAL ===
        async function scanSystem() {
            credits--; localStorage.setItem('user_credits', credits); updateUI();
            const cons = document.getElementById('console');
            const res = document.getElementById('resultBox');
            lockUI(cons, res);

            const cores = navigator.hardwareConcurrency ? navigator.hardwareConcurrency : 'No detectado';
            const screenRes = `${window.screen.width}x${window.screen.height}`;
            const lang = navigator.language || 'es-ES';
            const userAgent = navigator.userAgent;
            
            let os = "Sistema Desconocido";
            if(userAgent.indexOf("Win") !== -1) os = "Windows OS";
            if(userAgent.indexOf("Mac") !== -1) os = "macOS / iOS";
            if(userAgent.indexOf("Linux") !== -1) os = "Linux";
            if(userAgent.indexOf("Android") !== -1) os = "Android OS";

            // ¡ESTO ES LO ÚNICO NUEVO! Detecta la IP del usuario.
            let userIP = "Desconocida";
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                userIP = ipData.ip;
            } catch(e){}

            await typeLog(`<span class="log-hex">${getHex()}</span><span class="log-prefix">[SYS]</span> Escaneando métricas locales...`, cons);
            await typeLog(`<span class="log-hex">${getHex()}</span><span class="log-prefix">[NET]</span> IP Pública Identificada: <span style="color:#fff">${userIP}</span>`, cons);
            await typeLog(`<span class="log-hex">${getHex()}</span><span class="log-prefix">[HARDWARE]</span> Procesador: ${cores} núcleos | Display: ${screenRes}`, cons);
            await typeLog(`<span class="log-hex">${getHex()}</span><span class="log-prefix">[OS]</span> Firma digital: ${os}`, cons);
            await typeLog(`<span class="log-hex">${getHex()}</span><span class="log-prefix">[NET]</span> Región/Idioma expuesto: ${lang}`, cons);
            await typeLog(`<span class="log-hex">${getHex()}</span><span class="log-prefix log-warn">[WARN]</span> Fingerprinting detectado. Rastreabilidad al 94%.`, cons);

            setTimeout(() => {
                cons.style.display = 'none'; res.style.display = 'block';
                let dateStr = new Date().toLocaleString('es-ES');
                document.getElementById('finalStatus').innerHTML = "<h2 style='color:var(--danger); margin:0;'>⚠️ IDENTIDAD EXPUESTA</h2>";
                document.getElementById('details').innerHTML = `
                    <div class="vulnerability-card" style="border-left-color:var(--danger)">
                        <b>🔍 REPORTE DE SISTEMA LOCAL</b><br><br>
                        <b>Objetivo:</b> Dispositivo Local<br>
                        <b>Fecha del escaneo:</b> ${dateStr}<br>
                        <hr style="border-color: rgba(255,255,255,0.1); margin: 10px 0;">
                        <b>IP Expuesta:</b> ${userIP}<br>
                        <b>Sistema Operativo:</b> ${os}<br>
                        <b>Hardware Detectado:</b> ${cores} Cores lógicos, Resolución ${screenRes}<br>
                        <b>Huella Digital:</b> Región ${lang}<br>
                        <b>Nivel de Amenaza:</b> Crítico (Rastreo Abierto)<br>

        const canvas = document.getElementById('cyberCanvas');

        let w, h;

        function animate() {
            ctx.clearRect(0,0,w,h); ctx.fillStyle = "rgba(96, 165, 250, 0.15)";
